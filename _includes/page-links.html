{% assign pages_list = site.pages
| where_exp: "p", "p.sidebar_link == true"
| where_exp: "p", "p.section_id"
| sort: "order" %}

{% for node in pages_list %}
<a class="page-link {% if page.url == node.url %} active{% endif %}"
   href="{{ '/' | relative_url }}#{{ node.section_id }}">
    {% if node.short_title %}{{ node.short_title }}{% else %}{{ node.title }}{% endif %}
</a>
{% endfor %}
